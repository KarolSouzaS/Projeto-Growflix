<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Favicon -->
    <link rel="shortcut icon" href="/assets/images/favicon.ico" type="image/x-icon">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/assets/libs/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles/styles.css">

    <title>Growflix - Todos os vídeos da Growdev em um só lugar.</title>
</head>

<body class="bg-black">

    <!-- HEADER -->
    <header class="container-fluid banner-home">
        <div class="row">
            <div class="col-12">
                <nav class="navbar navbar-expand-lg navbar-dark">
                    <div class="container-fluid">

                        <!-- LOGO -->
                        <a class="navbar-brand" href="/">
                            <img src="/assets/images/logo-growflix.svg" 
                                 alt="Logo Growflix" 
                                 width="120" height="30">
                        </a>

                        <!-- BOTÃO MOBILE -->
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                            data-bs-target="#navbarNavAltMarkup">
                            <span class="navbar-toggler-icon"></span>
                        </button>

                        <!-- MENU -->
                        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                            <div class="navbar-nav">
                                <a class="nav-link active" href="/">Início</a>
                                <a class="nav-link" href="#growcast-items">Growcast</a>
                                <a class="nav-link" href="#webinar-items">Webinar</a>
                                <a class="nav-link" href="#uxUi-items">UX/UI</a>
                                <a class="nav-link" href="#diversos-items">Diversos</a>
                            </div>
                        </div>

                    </div>
                </nav>
            </div>

            <!-- HERO -->
            <div class="row row-home-growcast">
                <div class="col-12">
                    <div class="container">
                        <div class="row p-2">

                            <div class="col-12 pt-5">
                                <p class="text-light fw-bold">
                                    <small>PODCAST</small><br>
                                    <span class="display-1 fw-bold">GROWCAST</span>
                                </p>
                            </div>

                            <div class="col-12 pb-5">
                                <button class="btn btn-light fw-bold"
                                    data-link="https://www.youtube.com/embed/7OWT3lfHYvE"
                                    onclick="openMovie(this)">
                                    Assistir
                                </button>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="container-fluid">
        <div class="row divider-row">
            <div class="col-12">
                <div class="container">

                    <!-- SEÇÕES -->
                    <div class="row pb-2" id="growcast-items">
                        <div class="col-12">
                            <p class="fw-bold">
                                <a href="#growcast-items" class="link-growdev">Growcast</a>
                            </p>
                        </div>
                    </div>

                    <div class="row pb-5" id="webinar-items">
                        <div class="col-12">
                            <p class="fw-bold">
                                <a href="#webinar-items" class="link-growdev">Webinar</a>
                            </p>
                        </div>
                    </div>

                    <div class="row pb-2" id="uxUi-items">
                        <div class="col-12">
                            <p class="fw-bold">
                                <a href="#uxUi-items" class="link-growdev">UX/UI</a>
                            </p>
                        </div>
                    </div>

                    <div class="row pb-2" id="diversos-items">
                        <div class="col-12">
                            <p class="fw-bold">
                                <a href="#diversos-items" class="link-growdev">Diversos</a>
                            </p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="text-secondary text-center p-5">
        <p>Growflix - Karoline Souza</p>
    </footer>

    <!-- MODAL -->
    <div class="modal fade" id="movie-modal">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content modal-content-movie">

                <div class="modal-header justify-content-end">
                    <button class="btn" data-bs-dismiss="modal">
                        ✕
                    </button>
                </div>

                <div class="ratio ratio-21x9" id="iframe-movie"></div>

            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="/assets/libs/bootstrap/js/bootstrap.min.js"></script>
    <script type="module" src="/js/home.js"></script>

</body>
</html>
